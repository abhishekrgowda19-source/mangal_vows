<!DOCTYPE html>
<html>
<head>
    <title>Agent Dashboard</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f4f6f9;
        }

        .header {
            background: #4f46e5;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
        }

        .container {
            padding: 30px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .btn {
            padding: 10px 15px;
            background: #4f46e5;
            color: white;
            text-decoration: none;
            border-radius: 6px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        th {
            background: #f1f1f1;
        }
    </style>
</head>
<body>

<div class="header">
    <h2>Agent: {{ agent.name }}</h2>
    <div>
        <a href="/agent-add-user" class="btn">+ Add User</a>
        <a href="/logout" class="btn">Logout</a>
    </div>
</div>

<div class="container">

    <div class="card">
        <h3>Total Users Managed</h3>
        <h1>{{ users|length }}</h1>
    </div>

    <div class="card">
        <h3>Your Users</h3>

        <table>
            <tr>
                <th>Name</th>
                <th>Phone</th>
            </tr>

            {% for user in users %}
            <tr>
                <td>{{ user.name }}</td>
                <td>{{ user.phone }}</td>
            </tr>
            {% endfor %}
        </table>
    </div>

</div>

</body>
</html>
