<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add User - Mangal Vows</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>
.form-section { margin-bottom: 15px; }
.form-section label { display:block; font-weight:600; margin-bottom:5px; font-size:14px; }
.form-section input,
.form-section select {
    width:100%; padding:10px; border-radius:8px;
    border:1px solid #ccc; font-size:14px;
}
.double-input { display:flex; gap:10px; }
.mobile-input { display:flex; }
.country-code {
    padding:10px; background:#eee;
    border:1px solid #ccc; border-right:none;
    border-radius:8px 0 0 8px;
}
.mobile-input input {
    border-radius:0 8px 8px 0;
    border-left:none; flex:1;
}
.error { color:red; text-align:center; margin-bottom:10px; }
.section-heading { font-size:13px; font-weight:700; color:#2563eb; margin:18px 0 10px; }
.back-link { display:block; text-align:center; margin-top:15px; color:#2563eb; }
</style>
</head>

<body>
<div class="portal-card">

<h2>Add New Client</h2>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

<form method="POST" action="{{ url_for('agent_bp.agent_add_user') }}">

<!-- BASIC -->
<div class="section-heading">Basic Info</div>

<div class="form-section">
<label>Name *</label>
<input type="text" name="name"
       pattern="[A-Za-z ]{2,25}" maxlength="25"
       required>
</div>

<div class="form-section">
<label>Phone *</label>
<div class="mobile-input">
<span class="country-code">+91</span>
<input type="tel" name="phone"
       pattern="[6-9]{1}[0-9]{9}" maxlength="10"
       required>
</div>
</div>

<div class="form-section">
<label>Email</label>
<input type="email" name="email" maxlength="35">
</div>

<div class="form-section">
<label>Age & Gender</label>
<div class="double-input">
<input type="number" name="age" min="18" max="60">

<select name="gender">
<option value="">Select</option>
<option value="male">Male</option>
<option value="female">Female</option>
<option value="other">Other</option>
</select>
</div>
</div>

<div class="form-section">
<label>Height (cm)</label>
<input type="number" name="height" min="100" max="250">
</div>

<!-- CULTURE -->
<div class="section-heading">Cultural Info</div>

<div class="form-section">
<label>Religion</label>
<input type="text" name="religion" pattern="[A-Za-z ]{2,25}">
</div>

<div class="form-section">
<label>Caste</label>
<input type="text" name="caste" pattern="[A-Za-z ]{2,25}">
</div>

<div class="form-section">
<label>Community</label>
<input type="text" name="community" pattern="[A-Za-z ]{2,25}">
</div>

<div class="form-section">
<label>Mother Tongue</label>
<input type="text" name="mother_tongue" pattern="[A-Za-z ]{2,25}">
</div>

<!-- PROFESSIONAL -->
<div class="section-heading">Professional</div>

<div class="form-section">
<label>Profession</label>
<input type="text" name="profession" pattern="[A-Za-z ]{2,25}">
</div>

<div class="form-section">
<label>Education</label>
<input type="text" name="education" pattern="[A-Za-z ]{2,25}">
</div>

<!-- LOCATION -->
<div class="section-heading">Location</div>

<div class="form-section">
<label>City</label>
<input type="text" name="city" pattern="[A-Za-z ]{2,25}">
</div>

<div class="form-section">
<label>State</label>
<select name="state">
<option value="">Select</option>
<option value="karnataka">Karnataka</option>
<option value="tamil nadu">Tamil Nadu</option>
<option value="kerala">Kerala</option>
<option value="andhra pradesh">Andhra Pradesh</option>
<option value="telangana">Telangana</option>
<option value="maharashtra">Maharashtra</option>
</select>
</div>

<button class="secure-btn">Add Client</button>

</form>

<a href="{{ url_for('agent_bp.agent_dashboard') }}" class="back-link">
← Back
</a>

</div>
</body>
</html>
