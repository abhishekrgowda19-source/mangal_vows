<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - Mangal Vows</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<style>
.form-section { margin-bottom: 15px; }
.form-section label {
    display: block;
    font-weight: 600;
    margin-bottom: 5px;
    font-size: 14px;
}
.form-section input,
.form-section select {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 14px;
    box-sizing: border-box;
}
.double-input { display: flex; gap: 10px; }
.double-input input,
.double-input select { flex: 1; }
.mobile-input { display: flex; }
.country-code {
    padding: 10px;
    background: #eee;
    border: 1px solid #ccc;
    border-right: none;
    border-radius: 8px 0 0 8px;
    white-space: nowrap;
}
.mobile-input input {
    border-radius: 0 8px 8px 0;
    border-left: none;
    flex: 1;
}
.section-heading {
    font-size: 13px;
    font-weight: 700;
    color: #2563eb;
    margin: 18px 0 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid #e5e7eb;
    padding-bottom: 5px;
}
.error {
    color: red;
    text-align: center;
    margin-bottom: 10px;
    font-size: 14px;
}
.back-link {
    display: block;
    text-align: center;
    margin-top: 15px;
    color: #2563eb;
    text-decoration: none;
    font-size: 14px;
}
.info-box {
    background: #eff6ff;
    border-radius: 8px;
    padding: 12px;
    font-size: 13px;
    color: #1e40af;
    margin-bottom: 20px;
    text-align: center;
}
</style>
</head>
<body>
<div class="background-animation"></div>
<div class="portal-card">

    <div class="header-bar">
        <div class="brand">
            <div class="shield">M</div>
            <span>MANGAL VOWS</span>
        </div>
    </div>

    <h2>Create Your Profile</h2>
    <p class="subtitle">Register to find your perfect match</p>

    <div class="info-box">
        💳 After registration you'll be asked to pay ₹500 to activate your account
    </div>

    {% if error %}
    <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST" action="{{ url_for('user.self_register') }}">

        <!-- Basic -->
        <div class="section-heading">Basic Info</div>

        <div class="form-section">
            <label>Full Name *</label>
            <input type="text" name="name" placeholder="Your full name" required>
        </div>

        <div class="form-section">
            <label>Mobile Number *</label>
            <div class="mobile-input">
                <span class="country-code">+91</span>
                <input type="tel" name="phone" placeholder="10 digit number" required>
            </div>
        </div>

        <div class="form-section">
            <label>Email</label>
            <input type="email" name="email" placeholder="Email address">
        </div>

        <div class="form-section">
            <label>Age & Gender</label>
            <div class="double-input">
                <input type="number" name="age" placeholder="Age" required>
                <select name="gender" required>
                    <option value="">Select Gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>
            </div>
        </div>

        <div class="form-section">
            <label>Height</label>
            <input type="text" name="height" placeholder="e.g. 5'6">
        </div>

        <!-- Cultural -->
        <div class="section-heading">Cultural Info</div>

        <div class="form-section">
            <label>Religion *</label>
            <input type="text" name="religion" placeholder="e.g. Hindu, Muslim, Christian" required>
        </div>

        <div class="form-section">
            <label>Caste *</label>
            <input type="text" name="caste" placeholder="e.g. Brahmin, Reddy, Nair" required>
        </div>

        <div class="form-section">
            <label>Community</label>
            <input type="text" name="community" placeholder="e.g. Iyer, Pillai">
        </div>

        <div class="form-section">
            <label>Mother Tongue</label>
            <input type="text" name="mother_tongue" placeholder="e.g. Tamil, Kannada">
        </div>

        <!-- Professional -->
        <div class="section-heading">Professional Info</div>

        <div class="form-section">
            <label>Profession</label>
            <input type="text" name="profession" placeholder="e.g. Software Engineer">
        </div>

        <div class="form-section">
            <label>Education</label>
            <input type="text" name="education" placeholder="e.g. B.Tech, MBBS">
        </div>

        <!-- Location -->
        <div class="section-heading">Location</div>

        <div class="form-section">
            <label>City & State *</label>
            <div class="double-input">
                <input type="text" name="city" placeholder="City" required>
                <input type="text" name="state" placeholder="State" required>
            </div>
        </div>

        <button type="submit" class="secure-btn" style="margin-top:15px;">
            ✅ Register & Proceed to Payment
        </button>

    </form>

    <a href="{{ url_for('user.home') }}" class="back-link">← Back to Login</a>

</div>
</body>
</html>
