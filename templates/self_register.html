<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Profile - Mangal Vows</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>
.form-section { margin-bottom:15px; }
.form-section label { font-weight:600; display:block; margin-bottom:5px; }
.form-section input, .form-section select {
    width:100%; padding:10px;
    border-radius:8px; border:1px solid #ccc;
}
.error-msg { color:red; text-align:center; }
</style>
</head>

<body>

<div class="portal-card">
<h2>Create Your Profile</h2>

{% if error %}
<p class="error-msg">{{ error }}</p>
{% endif %}

<form method="POST">

<!-- NAME -->
<div class="form-section">
<label>Full Name *</label>
<input type="text" name="name" maxlength="25" pattern="[A-Za-z ]{2,25}" required>
</div>

<!-- PHONE -->
<div class="form-section">
<label>Phone *</label>
<input type="text" name="phone" maxlength="10" pattern="[6-9]{1}[0-9]{9}" required>
</div>

<!-- EMAIL -->
<div class="form-section">
<label>Email</label>
<input type="email" name="email" maxlength="35">
</div>

<!-- AGE -->
<div class="form-section">
<label>Age *</label>
<input type="number" name="age" min="18" max="60" required>
</div>

<!-- GENDER -->
<div class="form-section">
<label>Gender *</label>
<select name="gender" required>
<option value="">Select</option>
<option value="male">Male</option>
<option value="female">Female</option>
<option value="other">Other</option>
</select>
</div>

<!-- 🔥 NEW: BIRTH DETAILS -->
<div class="form-section">
<label>Birth Place *</label>
<input type="text" name="birth_place" maxlength="50" required>
</div>

<div class="form-section">
<label>Birth Time *</label>
<input type="time" name="birth_time" required>
</div>

<!-- HEIGHT -->
<div class="form-section">
<label>Height (cm)</label>
<input type="number" name="height" min="100" max="220">
</div>

<!-- RELIGION -->
<div class="form-section">
<label>Religion *</label>
<select name="religion" id="religion" required onchange="toggleOtherReligion()">
<option value="">Select</option>
<option value="hindu">Hindu</option>
<option value="muslim">Muslim</option>
<option value="christian">Christian</option>
<option value="sikh">Sikh</option>
<option value="jain">Jain</option>
<option value="buddhist">Buddhist</option>
<option value="other">Other</option>
</select>
</div>

<div class="form-section" id="otherReligionBox" style="display:none;">
<label>Specify Religion</label>
<input type="text" name="other_religion" maxlength="20">
</div>

<!-- EDUCATION -->
<div class="form-section">
<label>Education Level *</label>
<select name="education" id="eduLevel" required onchange="toggleStream()">
<option value="">Select</option>
<option value="sslc">SSLC</option>
<option value="puc">PUC</option>
<option value="diploma">Diploma</option>
<option value="ug">UG</option>
<option value="pg">PG</option>
<option value="phd">PhD</option>
</select>
</div>

<div class="form-section" id="streamBox" style="display:none;">
<label>Stream</label>
<select name="education_stream">
<option value="">Select</option>
<option value="engineering">Engineering</option>
<option value="medical">Medical</option>
<option value="commerce">Commerce</option>
<option value="arts">Arts</option>
<option value="science">Science</option>
<option value="management">Management</option>
<option value="law">Law</option>
<option value="other">Other</option>
</select>
</div>

<!-- PROFESSION -->
<div class="form-section">
<label>Profession *</label>
<select name="profession" id="profession" required onchange="toggleOtherProfession()">
<option value="">Select</option>
<option value="software engineer">Software Engineer</option>
<option value="doctor">Doctor</option>
<option value="teacher">Teacher</option>
<option value="business">Business</option>
<option value="government job">Government Job</option>
<option value="private employee">Private Employee</option>
<option value="banking">Banking</option>
<option value="farmer">Farmer</option>
<option value="self employed">Self Employed</option>
<option value="student">Student</option>
<option value="other">Other</option>
</select>
</div>

<div class="form-section" id="otherProfessionBox" style="display:none;">
<label>Specify Profession</label>
<input type="text" name="other_profession" maxlength="30">
</div>

<!-- CITY -->
<div class="form-section">
<label>City</label>
<input type="text" name="city" maxlength="25">
</div>

<!-- STATE -->
<div class="form-section">
<label>State *</label>
<select name="state" required>
<option value="">Select</option>
<option value="karnataka">Karnataka</option>
<option value="tamil nadu">Tamil Nadu</option>
<option value="kerala">Kerala</option>
<option value="maharashtra">Maharashtra</option>
<option value="delhi">Delhi</option>
<option value="uttar pradesh">Uttar Pradesh</option>
<option value="telangana">Telangana</option>
<option value="andhra pradesh">Andhra Pradesh</option>
<option value="west bengal">West Bengal</option>
<option value="gujarat">Gujarat</option>
<option value="rajasthan">Rajasthan</option>
<option value="punjab">Punjab</option>
<option value="haryana">Haryana</option>
<option value="bihar">Bihar</option>
<option value="odisha">Odisha</option>
<option value="assam">Assam</option>
<option value="jharkhand">Jharkhand</option>
<option value="chhattisgarh">Chhattisgarh</option>
<option value="himachal pradesh">Himachal Pradesh</option>
<option value="uttarakhand">Uttarakhand</option>
<option value="goa">Goa</option>
<option value="tripura">Tripura</option>
<option value="manipur">Manipur</option>
<option value="meghalaya">Meghalaya</option>
<option value="mizoram">Mizoram</option>
<option value="nagaland">Nagaland</option>
<option value="arunachal pradesh">Arunachal Pradesh</option>
<option value="sikkim">Sikkim</option>
</select>
</div>

<!-- PINCODE -->
<div class="form-section">
<label>Pincode *</label>
<input type="text" name="pincode" maxlength="6" pattern="[0-9]{6}" required>
</div>

<button class="secure-btn">Register</button>

</form>
</div>

<!-- JS -->
<script>
function toggleOtherReligion() {
    document.getElementById("otherReligionBox").style.display =
        (document.getElementById("religion").value === "other") ? "block" : "none";
}

function toggleOtherProfession() {
    document.getElementById("otherProfessionBox").style.display =
        (document.getElementById("profession").value === "other") ? "block" : "none";
}

function toggleStream() {
    const val = document.getElementById("eduLevel").value;
    const show = ["ug","pg","diploma","phd"].includes(val);
    document.getElementById("streamBox").style.display = show ? "block" : "none";
}
</script>

</body>
</html>
