<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f4f6f9;
        }

        .header {
            background: #111827;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-right .btn {
            margin-left: 10px;
        }

        .container {
            padding: 30px;
        }

        .cards {
            display: flex;
            gap: 20px;
            flex-wrap: wrap; /* ✅ responsive fix */
        }

        .card {
            flex: 1 1 200px; /* ✅ responsive */
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }

        .btn {
            padding: 10px 15px;
            background: #2563eb;
            color: white;
            text-decoration: none;
            border-radius: 6px;
        }

        .subtitle {
            font-size: 14px;
            color: #9ca3af;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="header">
    <div>
        <h2>Admin Dashboard</h2>
        <div class="subtitle">
            Welcome, {{ session.admin }}
        </div>
    </div>

    <div class="header-right">
        <a href="/admin" class="btn">Admin Panel</a>
        <a href="/logout" class="btn">Logout</a>
    </div>
</div>

<div class="container">

    <div class="cards">

        <div class="card">
            <h3>Total Users</h3>
            <h1>{{ users or 0 }}</h1>
        </div>

        <div class="card">
            <h3>Total Agents</h3>
            <h1>{{ agents or 0 }}</h1>
        </div>

    </div>

</div>

</body>
</html>
