<!DOCTYPE html>
<html>
<head>

<title>Mangal Vows Admin</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
}

.card{
border:none;
border-radius:12px;
}

.stat-card{
padding:25px;
font-size:18px;
font-weight:600;
}

.navbar{
background:#1e293b;
}

</style>

</head>

<body>

<nav class="navbar navbar-dark">
<div class="container-fluid">
<span class="navbar-brand">Mangal Vows Admin Panel</span>

<div>
<a href="/admin" class="btn btn-outline-light btn-sm">Database</a>
<a href="/logout" class="btn btn-danger btn-sm">Logout</a>
</div>

</div>
</nav>


<div class="container mt-4">

<div class="row g-4">

<div class="col-md-4">
<div class="card bg-primary stat-card">
Total Users<br>
<h2>{{ users }}</h2>
</div>
</div>

<div class="col-md-4">
<div class="card bg-success stat-card">
Active Subscriptions<br>
<h2>{{ subscriptions }}</h2>
</div>
</div>

<div class="col-md-4">
<div class="card bg-warning stat-card">
Agents<br>
<h2>{{ agents }}</h2>
</div>
</div>

</div>


<div class="card mt-5 bg-dark p-4">

<h4>Quick Actions</h4>

<div class="mt-3">

<a href="/admin/user/" class="btn btn-primary">
Manage Users
</a>

<a href="/admin/agent/" class="btn btn-success">
Manage Agents
</a>

</div>

</div>

</div>

</body>
</html>
