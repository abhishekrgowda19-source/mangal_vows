<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login - Mangal Vows</title>

<style>
body {
    margin: 0;
    height: 100vh;
    font-family: 'Segoe UI', Arial;
    background: linear-gradient(135deg, #1d2671, #c33764);
    display: flex;
    justify-content: center;
    align-items: center;
}

.login-box {
    background: white;
    padding: 35px;
    border-radius: 12px;
    width: 320px;
    text-align: center;
}

h2 { margin-bottom: 5px; }

.subtitle {
    font-size: 13px;
    color: gray;
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 12px;
    margin: 8px 0 2px;
    border-radius: 8px;
    border: 1px solid #ccc;
    box-sizing: border-box;
}

input:focus {
    border-color: #c33764;
    outline: none;
}

.hint {
    font-size: 11px;
    color: #aaa;
    text-align: right;
    margin: 0 0 8px;
}

button {
    width: 100%;
    padding: 12px;
    background: #c33764;
    border: none;
    color: white;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    margin-top: 4px;
}

button:hover { background: #a82a54; }

button:disabled {
    background: #9ca3af;
    cursor: not-allowed;
}

.error {
    color: red;
    font-size: 13px;
    min-height: 18px;
    margin-top: 10px;
}

.footer {
    margin-top: 15px;
    font-size: 12px;
    color: gray;
}
</style>
</head>

<body>

<div class="login-box">

<h2>Mangal Vows</h2>
<div class="subtitle">Admin Portal</div>

<form method="POST" onsubmit="this.querySelector('button').disabled=true;">

    <!-- ✅ username: max 15 chars -->
    <input type="text"
           name="username"
           placeholder="Username"
           maxlength="15"
           required
           autocomplete="username">
    <div class="hint">Max 15 characters</div>

    <!-- ✅ password: max 15 chars -->
    <input type="password"
           name="password"
           placeholder="Password"
           maxlength="15"
           required
           autocomplete="current-password">
    <div class="hint">Max 15 characters</div>

    <button type="submit">Login</button>

</form>

{% if error %}
<p class="error">{{ error }}</p>
{% else %}
<p class="error"></p>
{% endif %}

<div class="footer">Secure Admin Access</div>

</div>

</body>
</html>
