<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mangal Vows Portal</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>

/* ===== YOUR CSS (UNCHANGED) ===== */

.role-tabs{
display:flex;
justify-content:center;
gap:10px;
margin-top:20px;
}

.role-tabs button{
padding:10px 18px;
border:none;
border-radius:20px;
background:#e5e7eb;
cursor:pointer;
font-weight:600;
}

.role-tabs button.active{
background:#2563eb;
color:white;
}

.role-panel{
margin-top:20px;
}

.login-switch{
margin-top:20px;
}

.switch-buttons{
display:flex;
justify-content:center;
gap:15px;
margin-bottom:20px;
}

.switch-buttons button{
padding:10px 18px;
border:none;
border-radius:20px;
background:#e5e7eb;
cursor:pointer;
font-weight:600;
}

.slider-container{
overflow:hidden;
width:100%;
}

.slider{
display:flex;
width:200%;
transition:0.4s ease;
}

.slide{
width:50%;
padding:20px;
}

.slide.personal{
background:#f8fafc;
border-radius:12px;
}

.row{
margin-bottom:15px;
}

.row label{
font-size:14px;
font-weight:600;
display:block;
margin-bottom:5px;
}

.row input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}

.double-input{
display:flex;
gap:10px;
}

.mobile-input{
display:flex;
}

.country-code{
padding:10px;
background:#eee;
border:1px solid #ccc;
border-right:none;
border-radius:8px 0 0 8px;
}

.mobile-input input{
border-radius:0 8px 8px 0;
border-left:none;
}

.secure-btn{
width:100%;
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:10px;
font-weight:600;
cursor:pointer;
margin-top:10px;
}

.section-title{
font-size:16px;
font-weight:700;
margin-bottom:15px;
color:#2563eb;
}

</style>

</head>

<body>

<div class="portal-card">

<h2>Portal Login</h2>

<!-- ROLE TABS -->
<div class="role-tabs">
<button onclick="showRole('user')">User</button>
<button onclick="showRole('agent')">Agent</button>
<button onclick="showRole('admin')">Admin</button>
</div>

<!-- ================= USER PANEL ================= -->
<div id="userPanel" class="role-panel">

<div class="login-switch">

<div class="switch-buttons">
<button onclick="showCommercial()">Commercial Login</button>
<button onclick="showPersonal()">Personal Login</button>
</div>

<div class="slider-container">
<div class="slider" id="loginSlider">

<!-- ===== COMMERCIAL LOGIN ===== -->
<div class="slide">

<div class="section-title">Commercial Portal Access</div>

<form method="POST" action="/login">

<div class="row">
<label>User Identifier</label>
<div class="double-input">
<input type="text" name="name3" maxlength="3" placeholder="First 3 letters" required>
<input type="text" name="surname3" placeholder="Surname">
</div>
</div>

<div class="row">
<label>Date of Birth</label>
<input type="date" name="dob">
</div>

<div class="row">
<label>Birth Details</label>
<div class="double-input">
<input type="time" name="birthtime">
<input type="text" name="birthplace" placeholder="City">
</div>
</div>

<div class="row">
<label>Mobile Number</label>
<div class="mobile-input">
<span class="country-code">+91</span>
<input type="tel" name="phone" required>
</div>
</div>

<button class="secure-btn">Commercial Login</button>

</form>
</div>

<!-- ===== PERSONAL LOGIN ===== -->
<div class="slide personal">

<div class="section-title">Personal Login</div>

<form method="POST" action="/personal-login">

<div class="row">
<label>Full Name</label>
<input type="text" name="name" required>
</div>

<div class="row">
<label>Mobile Number</label>
<div class="mobile-input">
<span class="country-code">+91</span>
<input type="tel" name="phone" required>
</div>
</div>

<button class="secure-btn">Personal Login</button>

</form>

</div>

</div>
</div>

</div>
</div>

<!-- ================= AGENT PANEL ================= -->
<div id="agentPanel" class="role-panel" style="display:none;">

<form method="POST" action="/agent-login">

<div class="row">
<label>Email</label>
<input type="email" name="email" required>
</div>

<div class="row">
<label>Password</label>
<input type="password" name="password" required>
</div>

<button class="secure-btn">Agent Login</button>

</form>

</div>

<!-- ================= ADMIN PANEL ================= -->
<div id="adminPanel" class="role-panel" style="display:none;">

<form method="POST" action="/admin-login">

<div class="row">
<label>Username</label>
<input type="text" name="username" required>
</div>

<div class="row">
<label>Password</label>
<input type="password" name="password" required>
</div>

<button class="secure-btn">Admin Login</button>

</form>

</div>

</div>

<!-- ================= SCRIPT ================= -->
<script>

function showRole(role){

document.getElementById("userPanel").style.display="none";
document.getElementById("agentPanel").style.display="none";
document.getElementById("adminPanel").style.display="none";

if(role==="user") document.getElementById("userPanel").style.display="block";
if(role==="agent") document.getElementById("agentPanel").style.display="block";
if(role==="admin") document.getElementById("adminPanel").style.display="block";
}

function showCommercial(){
document.getElementById("loginSlider").style.transform="translateX(0%)";
}

function showPersonal(){
document.getElementById("loginSlider").style.transform="translateX(-50%)";
}

window.onload = function(){
showRole("user");
}

</script>

</body>
</html>
