<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mangal Vows Portal</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#d4a017">
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
  <style>
    .role-tabs { display: flex; justify-content: center; gap: 10px; margin-top: 20px; }
    .role-tabs button { padding: 10px 18px; border: none; border-radius: 20px; background: #e5e7eb; cursor: pointer; font-weight: 600; }
    .role-tabs button.active { background: #2563eb; color: white; }
    .switch-buttons { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; }
    .slider-container { overflow: hidden; width: 100%; }
    .slider { display: flex; width: 200%; transition: 0.4s ease; }
    .slide { width: 50%; padding: 20px; }
    .row { margin-bottom: 15px; }
    .row label { font-size: 13px; font-weight: 600; color: #374151; display: block; margin-bottom: 4px; }
    .row input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
    .mobile-input { display: flex; }
    .mobile-input input { border-radius: 0 8px 8px 0; }
    .country-code { padding: 10px; background: #eee; border-radius: 8px 0 0 8px; font-size: 14px; }
    .secure-btn { width: 100%; padding: 12px; background: #2563eb; color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 15px; }
    .register-btn { width: 100%; padding: 12px; background: white; color: #2563eb; border: 2px solid #2563eb; border-radius: 10px; cursor: pointer; font-size: 15px; }
    .error-msg { color: red; text-align: center; font-size: 13px; margin: 8px 0; min-height: 18px; }
    .switch-buttons button { padding: 8px 20px; border-radius: 20px; border: 2px solid #2563eb; background: white; color: #2563eb; cursor: pointer; font-weight: 600; }
    .switch-buttons button.active { background: #2563eb; color: white; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .logo-box { display: flex; align-items: center; gap: 10px; font-weight: bold; }
    .ticket-btn { background: #2563eb; color: white; padding: 8px 14px; border-radius: 8px; text-decoration: none; font-size: 13px; }
    .info-box { background: #eff6ff; border: 1px solid #2563eb; border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #1d4ed8; margin-bottom: 14px; }
    .birth-time-row { display: flex; gap: 8px; align-items: center; }
    .birth-time-row select { flex: 1; padding: 10px 8px; border-radius: 8px; border: 1px solid #ccc; font-size: 14px; background: white; cursor: pointer; appearance: auto; }
    .birth-time-sep { font-size: 18px; font-weight: 700; color: #374151; margin-bottom: 2px; }
    .char-hint { font-size: 11px; color: #6b7280; margin-top: 3px; display: block; }
  </style>
</head>

<body>

<div class="portal-card">

  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="logo-box">
      <img src="{{ url_for('static', filename='logo.png') }}" width="40">
      <span>Mangal Vows</span>
    </div>
    <a href="/raise-ticket" class="ticket-btn">🎫 Raise Ticket</a>
  </div>

  <h2>Portal Login</h2>

  <p class="error-msg">{{ error or "" }}</p>

  <!-- ROLE TABS -->
  <div class="role-tabs">
    <button id="tabUser"  onclick="showRole('user')">User</button>
    <button id="tabAgent" onclick="showRole('agent')">Agent</button>
    <button id="tabAdmin" onclick="showRole('admin')">Admin</button>
  </div>

  <!-- USER PANEL -->
  <div id="userPanel">
    <div class="switch-buttons" style="margin-top:16px;">
      <button id="btnCommercial" onclick="showCommercial()" class="active">Commercial</button>
      <button id="btnPersonal"   onclick="showPersonal()">Personal</button>
    </div>

    <div class="slider-container">
      <div class="slider" id="loginSlider">

        <!-- COMMERCIAL SLIDE -->
        <div class="slide">
          <div class="info-box">
            🏢 Commercial users can browse profiles freely.
            Contact details are hidden.
          </div>
          <form method="POST" action="{{ url_for('user.commercial_register') }}">
            <div class="row">
              <label>Full Name</label>
              <input type="text" name="name"
                     placeholder="Enter your name"
                     maxlength="10" minlength="2"
                     pattern="[A-Za-z ]{2,10}"
                     title="Name must be 2–10 letters only"
                     required>
              <small class="char-hint">Max 10 characters, letters only</small>
            </div>
            <div class="row">
              <label>Phone Number</label>
              <div class="mobile-input">
                <span class="country-code">+91</span>
                <input type="tel" name="phone"
                       pattern="[6-9]{1}[0-9]{9}"
                       maxlength="10"
                       placeholder="10 digit number"
                       required>
              </div>
            </div>
            <button class="secure-btn">Login</button>
          </form>
          <br>
          <a href="{{ url_for('user.self_register') }}">
            <button type="button" class="register-btn">Register as Personal</button>
          </a>
        </div>

        <!-- PERSONAL SLIDE -->
        <div class="slide">
          <form method="POST" action="{{ url_for('user.login') }}" onsubmit="assembleBirthTime(event)">
            <input type="hidden" name="login_as" value="personal">
            <input type="hidden" name="birth_time" id="birth_time_hidden">
            <div class="row">
              <label>Phone Number</label>
              <div class="mobile-input">
                <span class="country-code">+91</span>
                <input type="tel" name="phone"
                       pattern="[6-9]{1}[0-9]{9}"
                       maxlength="10" required>
              </div>
            </div>
            <div class="row">
              <label>Full Name</label>
              <input type="text" name="name" required>
            </div>
            <div class="row">
              <label>Birth Place</label>
              <input type="text" name="birth_place" placeholder="e.g. Bangalore" required>
            </div>
            <div class="row">
              <label>Birth Time</label>
              <div class="birth-time-row">
                <select id="bt_hour" required>
                  <option value="">HH</option>
                  {% for h in range(1, 13) %}
                    <option value="{{ h }}">{{ '%02d' % h }}</option>
                  {% endfor %}
                </select>
                <span class="birth-time-sep">:</span>
                <select id="bt_minute" required>
                  <option value="">MM</option>
                  {% for m in range(0, 60) %}
                    <option value="{{ '%02d' % m }}">{{ '%02d' % m }}</option>
                  {% endfor %}
                </select>
                <select id="bt_period" required>
                  <option value="">AM/PM</option>
                  <option value="AM">AM</option>
                  <option value="PM">PM</option>
                </select>
              </div>
              <small class="char-hint">Select hour, minute and AM/PM as registered</small>
            </div>
            <button class="secure-btn" type="submit">Login</button>
          </form>
          <br>
          <a href="{{ url_for('user.self_register') }}">
            <button type="button" class="register-btn">Register as Personal</button>
          </a>
        </div>

      </div>
    </div>
  </div>

  <!-- AGENT PANEL -->
  <div id="agentPanel" style="display:none;">
    <form method="POST" action="{{ url_for('agent_bp.agent_login_portal') }}" style="padding:20px;">
      <div class="row">
        <label>Email</label>
        <input type="email" name="email"
               maxlength="30" required
               value="{{ agent_email or '' }}">
        <small class="char-hint">Max 30 characters</small>
      </div>
      <div class="row">
        <label>Password</label>
        <input type="password" name="password"
               maxlength="15" required>
        <small class="char-hint">Max 15 characters</small>
      </div>
      <button class="secure-btn">Agent Login</button>
    </form>
  </div>

  <!-- ADMIN PANEL -->
  <div id="adminPanel" style="display:none;">
    <form method="POST" action="{{ url_for('admin_bp.admin_login_portal') }}" style="padding:20px;">
      <div class="row">
        <label>Username</label>
        <input type="text" name="username"
               maxlength="15" required
               value="{{ admin_username or '' }}">
        <small class="char-hint">Max 15 characters</small>
      </div>
      <div class="row">
        <label>Password</label>
        <input type="password" name="password"
               maxlength="15" required>
        <small class="char-hint">Max 15 characters</small>
      </div>
      <button class="secure-btn">Admin Login</button>
    </form>
  </div>

</div>

<script>
  const userPanel     = document.getElementById("userPanel");
  const agentPanel    = document.getElementById("agentPanel");
  const adminPanel    = document.getElementById("adminPanel");
  const loginSlider   = document.getElementById("loginSlider");
  const btnCommercial = document.getElementById("btnCommercial");
  const btnPersonal   = document.getElementById("btnPersonal");

  function showRole(role) {
    userPanel.style.display  = "none";
    agentPanel.style.display = "none";
    adminPanel.style.display = "none";

    document.getElementById("tabUser").classList.remove("active");
    document.getElementById("tabAgent").classList.remove("active");
    document.getElementById("tabAdmin").classList.remove("active");

    if (role === "user")  { userPanel.style.display  = "block"; document.getElementById("tabUser").classList.add("active"); }
    if (role === "agent") { agentPanel.style.display = "block"; document.getElementById("tabAgent").classList.add("active"); }
    if (role === "admin") { adminPanel.style.display = "block"; document.getElementById("tabAdmin").classList.add("active"); }

    localStorage.setItem("activeRole", role);
  }

  function showCommercial() {
    loginSlider.style.transform = "translateX(0%)";
    btnCommercial.classList.add("active");
    btnPersonal.classList.remove("active");
    localStorage.setItem("activeTab", "commercial");
  }

  function showPersonal() {
    loginSlider.style.transform = "translateX(-50%)";
    btnPersonal.classList.add("active");
    btnCommercial.classList.remove("active");
    localStorage.setItem("activeTab", "personal");
  }

  function assembleBirthTime(event) {
    const hour   = document.getElementById("bt_hour").value;
    const minute = document.getElementById("bt_minute").value;
    const period = document.getElementById("bt_period").value;

    if (!hour || !minute || !period) {
      event.preventDefault();
      alert("Please select hour, minute and AM/PM for Birth Time");
      return;
    }
    document.getElementById("birth_time_hidden").value = `${parseInt(hour)}:${minute} ${period}`;
  }

  window.onload = () => {
    const role = "{{ active_role or '' }}" || localStorage.getItem("activeRole") || "user";
    const tab  = localStorage.getItem("activeTab") || "commercial";

    showRole(role);
    if (tab === "personal") showPersonal();
    else showCommercial();
  };
</script>

</body>
</html>
