<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Login - Mangal Vows</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #4f46e5, #06b6d4);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: 14px;
            width: 320px;
            box-shadow: 0px 15px 40px rgba(0,0,0,0.25);
            text-align: center;
            animation: fadeIn 0.6s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        h2 {
            margin-bottom: 10px;
            color: #333;
        }

        .subtitle {
            font-size: 13px;
            color: #888;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0 2px;
            border: 1px solid #ddd;
            border-radius: 8px;
            transition: 0.3s;
            box-sizing: border-box;
        }

        input:focus {
            border-color: #4f46e5;
            outline: none;
            box-shadow: 0 0 5px rgba(79,70,229,0.3);
        }

        .hint {
            font-size: 11px;
            color: #aaa;
            text-align: right;
            margin: 0 0 8px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #4f46e5;
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            margin-top: 6px;
        }

        button:hover { background: #4338ca; }

        button:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }

        .error {
            color: red;
            font-size: 14px;
            margin-top: 10px;
            min-height: 18px;
        }

        .footer {
            margin-top: 15px;
            font-size: 12px;
            color: #777;
        }
    </style>
</head>

<body>

<div class="login-box">
    <h2>Mangal Vows</h2>
    <div class="subtitle">Agent Portal</div>

    <form method="POST" action="/agent-login"
          onsubmit="this.querySelector('button').disabled=true;">

        <!-- ✅ Email: max 30 chars -->
        <input type="email"
               name="email"
               placeholder="Email"
               maxlength="30"
               required
               autocomplete="email">
        <div class="hint">Max 30 characters</div>

        <!-- ✅ Password: max 15 chars -->
        <input type="password"
               name="password"
               placeholder="Password"
               maxlength="15"
               required
               autocomplete="current-password">
        <div class="hint">Max 15 characters</div>

        <button type="submit">Login</button>
    </form>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% else %}
        <p class="error"></p>
    {% endif %}

    <div class="footer">Secure Agent Access</div>
</div>

</body>
</html>
