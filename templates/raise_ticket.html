<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raise Ticket - Mangal Vows</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        body {
            font-family: Arial;
            background: #f5f6fa;
        }

        .container {
            width: 92%;
            max-width: 600px;
            margin: 40px auto;
            padding-bottom: 40px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .brand {
            font-size: 20px;
            font-weight: bold;
            color: #2563eb;
        }

        .back-btn {
            padding: 6px 14px;
            background: #6b7280;
            color: white;
            border-radius: 6px;
            text-decoration: none;
            font-size: 13px;
        }

        .card {
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .card h2 {
            margin: 0 0 6px 0;
            font-size: 20px;
            color: #111827;
        }

        .card p.subtitle {
            margin: 0 0 20px 0;
            font-size: 13px;
            color: #6b7280;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: bold;
            color: #374151;
            margin-bottom: 6px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
            font-family: Arial;
        }

        .form-group textarea {
            height: 120px;
            resize: vertical;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }

        .error {
            background: #fee2e2;
            color: #991b1b;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
        }

        .submit-btn:hover {
            background: #1d4ed8;
        }

        .tickets-link {
            display: block;
            text-align: center;
            margin-top: 14px;
            font-size: 13px;
            color: #2563eb;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="topbar">
        <div class="brand">💍 Mangal Vows</div>
        <a href="{{ url_for('user.dashboard') if session.get('role') == 'user' else url_for('agent_bp.agent_dashboard') }}"
           class="back-btn">← Back</a>
    </div>

    <div class="card">

        <h2>🎫 Raise a Ticket</h2>
        <p class="subtitle">Report an issue or request support. Our team will respond shortly.</p>

        {% if error %}
        <div class="error">⚠ {{ error }}</div>
        {% endif %}

        <form method="POST" action="{{ url_for('ticket_bp.raise_ticket') }}">

            <div class="form-group">
                <label>Ticket Type</label>
                <select name="ticket_type">
                    <option value="general">General Inquiry</option>
                    <option value="payment">Payment Issue</option>
                    <option value="profile">Profile Issue</option>
                    <option value="subscription">Subscription Issue</option>
                    <option value="dispute">Dispute / Report</option>
                    <option value="other">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label>Subject</label>
                <input type="text"
                       name="subject"
                       placeholder="Brief summary of your issue"
                       maxlength="200"
                       required>
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea name="description"
                          placeholder="Describe your issue in detail..."
                          required></textarea>
            </div>

            <button type="submit" class="submit-btn">📩 Submit Ticket</button>

        </form>

        <a href="{{ url_for('ticket_bp.my_tickets') }}" class="tickets-link">
            View my tickets →
        </a>

    </div>

</div>

</body>
</html>
