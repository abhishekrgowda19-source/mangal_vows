<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Link Expired - Mangal Vows</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>
.center-box {
    text-align:center;
    padding:40px 0;
}

.icon {
    font-size:60px;
    margin-bottom:10px;
}

.message {
    color:gray;
    font-size:14px;
    margin-top:10px;
}

.sub-message {
    color:#6b7280;
    font-size:13px;
    margin-top:5px;
}

.home-btn {
    display:inline-block;
    margin-top:20px;
    padding:10px 20px;
    background:#2563eb;
    color:white;
    border-radius:8px;
    text-decoration:none;
    font-size:14px;
}
</style>
</head>

<body>

<div class="background-animation"></div>

<div class="portal-card">

<!-- HEADER -->
<div class="header-bar">
    <div class="brand">
        <div class="shield">M</div>
        <span>MANGAL VOWS</span>
    </div>
</div>

<!-- CONTENT -->
<div class="center-box">

<div class="icon">⏰</div>

<h2>Link Expired</h2>

<p class="message">
{{ reason if reason else "This proposal link is no longer valid." }}
</p>

<p class="sub-message">
Please contact your agent to get a new link.
</p>

<a href="{{ url_for('user.home') }}" class="home-btn">
Go to Home
</a>

</div>

<!-- FOOTER -->
<div class="footer-text">
Mangal Vows · Secure · Private
</div>

</div>

</body>
</html>
